<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modal Simples - Amarelo e Marrom</title>
    <link rel="stylesheet" href="exercicio18.css">
</head>
<body>
    <button id="abrirModal" class="btn-abrir">Abrir Modal</button>

    <!-- Overlay (fundo semitransparente) -->
    <div id="overlay" class="overlay"></div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-conteudo">
            <div class="modal-header">
                <h2>Título do Modal</h2>
                <button id="fecharModal" class="btn-fechar">&times;</button>
            </div>
            <div class="modal-body">
                <p>Este é um modal simples com cores amarelo e marrom!</p>
                <p>Clique no botão fechar ou fora do modal para sair.</p>
            </div>
            <div class="modal-footer">
                <button id="fecharModalFooter" class="btn-footer">Fechar</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
