<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário Estilizado</title>
    <link rel="stylesheet" href="exercicio13.css">
</head>
<body>
    <div class="container">
        <form class="formulario">
            <h2 class="titulo">✨ Entre em Contato ✨</h2>
            
            <div class="grupo-campo">
                <label for="nome" class="label">Nome</label>
                <input type="text" id="nome" class="campo" placeholder="Digite seu nome completo" required>
                <span class="brilho"></span>
            </div>
            
            <div class="grupo-campo">
                <label for="email" class="label">E-mail</label>
                <input type="email" id="email" class="campo" placeholder="Digite seu e-mail" required>
                <span class="brilho"></span>
            </div>
            
            <button type="submit" class="botao">
                <span>Enviar Mensagem</span>
                <span class="brilho-botao"></span>
            </button>
            
            <div class="decoracao">
                <span>⭐</span>
                <span>✨</span>
                <span>💫</span>
            </div>
        </form>
    </div>
</body>
</html>
