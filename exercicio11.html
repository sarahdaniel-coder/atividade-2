<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundo do Mar com Peixes</title>
    <link rel="stylesheet" href="exercicio11.css">
</head>
<body>
    <!-- Fundo gradiente azul -->
    <div class="fundo-mar"></div>
    
    <!-- Bolhas de ar -->
    <div class="bolha" style="width: 30px; height: 30px; left: 10%; animation-duration: 6s;"></div>
    <div class="bolha" style="width: 50px; height: 50px; left: 30%; animation-duration: 8s; animation-delay: 2s;"></div>
    <div class="bolha" style="width: 20px; height: 20px; left: 50%; animation-duration: 5s; animation-delay: 1s;"></div>
    <div class="bolha" style="width: 40px; height: 40px; left: 70%; animation-duration: 7s; animation-delay: 3s;"></div>
    <div class="bolha" style="width: 25px; height: 25px; left: 90%; animation-duration: 6.5s; animation-delay: 0.5s;"></div>
    
    <!-- Peixes nadando (direita para esquerda) -->
    <div class="peixe" style="top: 20%; animation-duration: 15s; animation-delay: 0s;">🐟</div>
    <div class="peixe peixe2" style="top: 40%; animation-duration: 12s; animation-delay: 2s;">🐠</div>
    <div class="peixe peixe3" style="top: 60%; animation-duration: 18s; animation-delay: 1s;">🐡</div>
    <div class="peixe peixe4" style="top: 75%; animation-duration: 25s; animation-delay: 4s;">🐋</div>
    <div class="peixe peixe2" style="top: 15%; animation-duration: 14s; animation-delay: 5s;">🐠</div>
    <div class="peixe" style="top: 85%; animation-duration: 10s; animation-delay: 3s;">🐟</div>
    
    <!-- Peixes nadando na direção oposta (esquerda para direita) -->
    <div class="peixe peixe-esquerda" style="top: 30%; animation-duration: 20s; animation-delay: 0s;">🐟</div>
    <div class="peixe peixe-esquerda peixe3" style="top: 50%; animation-duration: 16s; animation-delay: 3s;">🐡</div>
    <div class="peixe peixe-esquerda peixe2" style="top: 70%; animation-duration: 22s; animation-delay: 1s;">🐠</div>
    <div class="peixe peixe-esquerda peixe5" style="top: 10%; animation-duration: 30s; animation-delay: 6s;">🦈</div>
    
    <!-- Conteúdo principal -->
    <div class="conteudo">
        <div class="card">
            <h1>🌊 Fundo do Mar 🌊</h1>
            <p>Gradiente azul com peixes passando</p>
            <p style="font-size: 18px;">🐚 De: azul escuro (#001f3f) → azul médio (#0066cc) → azul claro (#00aaff) 🐚</p>
            <p style="font-size: 40px; margin-top: 30px;">🐠 🐟 🐡 🐋</p>
        </div>
    </div>
</body>
</html>
